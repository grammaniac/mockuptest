<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRE Verbal 무료 모의고사</title>
    <style>
        /* Apple-style Typography & Reset */
        :root {
            --bg-color: #fbfbfd;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --apple-blue: #0071e3;
            --apple-blue-hover: #0077ED;
            --card-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard Variable", Pretendard, Roboto, "Noto Sans KR", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 980px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        /* Header Area */
        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: -0.015em;
            margin-bottom: 12px;
        }

        /* Notice Banner */
        .notice-banner {
            background-color: rgba(0, 113, 227, 0.05);
            border-radius: 18px;
            padding: 20px;
            text-align: center;
            margin-bottom: 50px;
            backdrop-filter: blur(10px);
        }

        .notice-banner p {
            font-size: 19px;
            font-weight: 600;
            color: var(--apple-blue);
            letter-spacing: -0.01em;
        }

        /* Mock Test Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 80px;
        }

        .test-card {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--card-bg);
            padding: 24px;
            border-radius: 18px;
            text-decoration: none;
            color: var(--text-primary);
            font-size: 17px;
            font-weight: 600;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.04);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            border: 1px solid rgba(0,0,0,0.02);
        }

        .test-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
            color: var(--apple-blue);
        }

        /* Portal Section */
        .portal-section {
            background: #ffffff;
            border-radius: 28px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
        }

        .portal-section h2 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: -0.01em;
        }

        .portal-section p {
            font-size: 19px;
            color: var(--text-secondary);
            margin-bottom: 32px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn-primary {
            display: inline-block;
            background-color: var(--apple-blue);
            color: #ffffff;
            padding: 14px 28px;
            border-radius: 980px;
            text-decoration: none;
            font-size: 17px;
            font-weight: 600;
            transition: background-color 0.3s ease, transform 0.1s ease;
        }

        .btn-primary:hover {
            background-color: var(--apple-blue-hover);
        }
        
        .btn-primary:active {
            transform: scale(0.97);
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            h1 { font-size: 36px; }
            .portal-section { padding: 40px 20px; }
            .portal-section h2 { font-size: 26px; }
        }
    </style>
</head>
<body>

                <a href="Verbal_Mock_35qshw.html" class="test-card">모의고사 35회</a>
                <a href="Verbal_Mock_36pedf.html" class="test-card">모의고사 36회</a>

                <a href="Verbal_Mock_39bcra.html" class="test-card">모의고사 39회</a>

        </section>

        <section class="portal-section">

            <a href="https://songverbalportal.pages.dev/" target="_blank" class="btn-primary">Portal 바로가기</a>
        </section>

    </div>

</body>
</html>
