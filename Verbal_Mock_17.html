// STATE
// ============================================================
const state = {
  screen: 'start', // start | section-intro | question | results
  currentSection: 0,
  currentQuestion: 0,
  answers: [{}, {}], // answers[sectionIdx][questionIdx] = value
  sectionDone: [false, false],
  timer: null,
  timeLeft: 0
};

// ============================================================
// HELPERS
// ============================================================
function $(id) { return document.getElementById(id); }

function formatTime(secs) {
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function getQuestion(si, qi) {
  return examData.sections[si].questions[qi];
}

function getTotalQ(si) {
  return examData.sections[si].questions.length;
}

// Normalize answer for comparison
function normalizeAnswer(ans) {
  if (!ans) return [];
  if (Array.isArray(ans)) return ans.map(a => a.trim().toLowerCase()).sort();
  return [String(ans).trim().toLowerCase()];
}

function isCorrect(q, userAns) {
  if (!userAns || (Array.isArray(userAns) && userAns.length === 0)) return false;
  const correct = normalizeAnswer(q.answer);
  const user = normalizeAnswer(userAns);
  return JSON.stringify(correct) === JSON.stringify(user);
}

function computeScore() {
  let total = 0;
  let s1 = 0, s2 = 0;
  examData.sections.forEach((sec, si) => {
    sec.questions.forEach((q, qi) => {
      const ua = state.answers[si][qi];
      if (isCorrect(q, ua)) {
        total++;
        if (si === 0) s1++; else s2++;
      }
    });
  });
  const scaled = Math.round(examData.scoringFormula.multiplier * total) + examData.scoringFormula.base;
  return { total, s1, s2, scaled };
}

function getAnswerDisplay(q, userAns) {
  if (!userAns || (Array.isArray(userAns) && userAns.length === 0)) return '-';
  if (q.type === 'TC') {
    if (q.blanks.length === 1) return Array.isArray(userAns) ? userAns[0] : userAns;
    return (Array.isArray(userAns) ? userAns : [userAns]).join(' / ');
  }
  if (Array.isArray(userAns)) return userAns.join(', ');
  return userAns;
}

function getCorrectDisplay(q) {
  if (q.type === 'TC') {
    if (q.blanks.length === 1) return q.answer[0];
    return q.answer.join(' / ');
  }
  return q.answer.join(', ');
}

// ============================================================
// TIMER
// ============================================================
function startTimer(seconds) {
  clearInterval(state.timer);
  state.timeLeft = seconds;
  renderTimer();
  state.timer = setInterval(() => {
    state.timeLeft--;
    renderTimer();
    if (state.timeLeft <= 0) {
      clearInterval(state.timer);
      handleTimeUp();
    }
  }, 1000);
}

function stopTimer() { clearInterval(state.timer); }

function renderTimer() {
  const el = $('timer');
  if (!el) return;
  el.textContent = formatTime(state.timeLeft);
  if (state.timeLeft <= 60) el.classList.add('warning');
  else el.classList.remove('warning');
}

function handleTimeUp() {
  state.sectionDone[state.currentSection] = true;
  if (state.currentSection === 0) {
    showModal('시간 종료', 'Section 1 시간이 종료되었습니다. Section 2로 이동합니다.', false, () => {
      state.currentSection = 1;
      state.currentQuestion = 0;
      state.screen = 'section-intro';
      render();
    });
  } else {
    showModal('시간 종료', 'Section 2 시간이 종료되었습니다. 결과를 확인합니다.', false, () => {
      state.screen = 'results';
      render();
    });
  }
}

// ============================================================
// MODAL
// ============================================================
function showModal(title, message, showCancel, onConfirm, onCancel) {
  $('modal-title').textContent = title;
  $('modal-message').textContent = message;
  $('modal-cancel').style.display = showCancel ? '' : 'none';
  $('modal').classList.add('show');
  $('modal-confirm').onclick = () => {
    $('modal').classList.remove('show');
    if (onConfirm) onConfirm();
  };
  $('modal-cancel').onclick = () => {
    $('modal').classList.remove('show');
    if (onCancel) onCancel();
  };
}

// ============================================================
// RENDER
// ============================================================
function render() {
  const app = $('app');
  if (state.screen === 'start') renderStart(app);
  else if (state.screen === 'section-intro') renderSectionIntro(app);
  else if (state.screen === 'question') renderQuestion(app);
  else if (state.screen === 'results') renderResults(app);
}

        <button class="btn btn-primary btn-large" onclick="startExam()">시작하기</button>
      </div>
    </main>
  `;
}

function startExam() {
  state.screen = 'section-intro';
  state.currentSection = 0;
  state.currentQuestion = 0;
  render();
}

function renderSectionIntro(app) {
  stopTimer();
  const si = state.currentSection;
  const sec = examData.sections[si];
  app.innerHTML = `
    <div style="height:0"></div>
    <main>
      <div class="section-intro">
        <div class="num">Section ${sec.number} of 2</div>
        <h2>Section ${sec.number}</h2>
        <div class="meta">
          ${sec.questions.length}문항 &nbsp;·&nbsp; ${sec.timeLimit}분<br>
          For each question, follow the specific directions given.<br>
          Select the best answer(s) for each question.
        </div>
        <button class="btn btn-primary btn-large" onclick="startSection()">Section ${sec.number} 시작</button>
      </div>
    </main>
  `;
}

function startSection() {
  const si = state.currentSection;
  state.screen = 'question';
  state.currentQuestion = 0;
  render();
  startTimer(examData.sections[si].timeLimit * 60);
}

function renderQuestion(app) {
  const si = state.currentSection;
  const qi = state.currentQuestion;
  const q = getQuestion(si, qi);
  const totalQ = getTotalQ(si);
  const progress = ((qi + 1) / totalQ * 100).toFixed(1);
  const isLast = qi === totalQ - 1;
  const userAns = state.answers[si][qi];

  // Build type label
  const typeLabels = {CR:'Critical Reasoning', RC_SINGLE:'Reading Comprehension', RC_MULTI:'Reading Comprehension', TC:'Text Completion', SE:'Sentence Equivalence'};

  // Check if next is enabled
  let nextEnabled = false;
  if (q.type === 'CR' || q.type === 'RC_SINGLE') {
    nextEnabled = !!userAns;
  } else if (q.type === 'RC_MULTI') {
    nextEnabled = Array.isArray(userAns) && userAns.length > 0;
  } else if (q.type === 'SE') {
    nextEnabled = Array.isArray(userAns) && userAns.length === 2;
  } else if (q.type === 'TC') {
    if (q.blanks.length === 1) {
      nextEnabled = Array.isArray(userAns) && userAns.length === 1 && userAns[0] !== undefined;
    } else {
      nextEnabled = Array.isArray(userAns) && userAns.length === q.blanks.length && userAns.every(a => a !== undefined && a !== null);
    }
  }

  const questionContent = buildQuestionHTML(q, si, qi, userAns);

  app.innerHTML = `
    <div class="topbar">
      <div class="topbar-left">
        <span class="label">Section</span><span class="value">${si + 1}</span>
        &nbsp;&nbsp;
        <span class="label">Question</span><span class="value">${qi + 1} / ${totalQ}</span>
      </div>
      <div class="timer" id="timer">${formatTime(state.timeLeft)}</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
    <main>
      <div class="question-meta">
        <span class="qtype">${typeLabels[q.type] || q.type}</span>
        <span>Q${qi + 1}</span>
      </div>
      ${questionContent}
    </main>
    <div class="footer-nav">
      <div class="nav-group">
        <button class="btn" onclick="goBack()" ${qi === 0 ? 'disabled' : ''}>&#8592; 이전</button>
      </div>
      <div class="nav-group">
        <button class="btn" onclick="skipQuestion()">건너뛰기 &#8594;</button>
        ${isLast
          ? `<button class="btn btn-finish" onclick="finishSection()" ${nextEnabled ? '' : 'disabled'}>섹션 완료 &#10003;</button>`
          : `<button class="btn btn-primary" onclick="nextQuestion()" ${nextEnabled ? '' : 'disabled'}>다음 &#8594;</button>`
        }
      </div>
    </div>
  `;
}

function buildQuestionHTML(q, si, qi, userAns) {
  if (q.type === 'CR') {
    return `
      <div class="question-body">
        <div class="stimulus">${escHtml(q.stimulus)}</div>
        <div class="question-text">${escHtml(q.questionText)}</div>
        <ul class="choices">
          ${q.choices.map(c => `
            <li class="choice ${userAns === c.label ? 'selected' : ''}" onclick="selectSingle(${si},${qi},'${c.label}')">
              <input type="radio" name="q${si}_${qi}" ${userAns === c.label ? 'checked' : ''} onchange="selectSingle(${si},${qi},'${c.label}')">
              <span><span class="label">${c.label}.</span>${escHtml(c.text)}</span>
            </li>`).join('')}
        </ul>
      </div>`;
  }

  if (q.type === 'RC_SINGLE' || q.type === 'RC_MULTI') {
    const isMulti = q.type === 'RC_MULTI';
    const choicesHtml = q.choices.map((c, ci) => {
      const sel = isMulti
        ? (Array.isArray(userAns) && userAns.includes(c.label))
        : userAns === c.label;
      return `
        <li class="choice ${sel ? 'selected' : ''}" onclick="${isMulti ? `toggleMulti(${si},${qi},'${c.label}')` : `selectSingle(${si},${qi},'${c.label}')`}">
          <input type="${isMulti ? 'checkbox' : 'radio'}" ${sel ? 'checked' : ''} onchange="${isMulti ? `toggleMulti(${si},${qi},'${c.label}')` : `selectSingle(${si},${qi},'${c.label}')`}">
          <span>${isMulti ? '' : `<span class="label">${c.label}.</span>`}${escHtml(c.text)}</span>
        </li>`;
    }).join('');
    return `
      <div class="layout-rc">
        <div class="passage">
          <div class="passage-label">Passage</div>
          <p>${q.passage}</p>
        </div>
        <div class="question-body">
          ${isMulti ? `<div class="directions">Consider each of the choices separately and select all that apply.</div>` : ''}
          <div class="question-text">${escHtml(q.questionText)}</div>
          <ul class="choices">${choicesHtml}</ul>
        </div>
      </div>`;
  }

  if (q.type === 'TC') {
    if (q.blanks.length === 1) {
      const blank = q.blanks[0];
      const choicesHtml = blank.choices.map((c, ci) => {
        const sel = Array.isArray(userAns) && userAns[0] === c.text;
        return `
          <li class="choice ${sel ? 'selected' : ''}" onclick="selectTC(${si},${qi},0,'${escAttr(c.text)}')">
            <input type="radio" name="tc_${si}_${qi}_0" ${sel ? 'checked' : ''}>
            <span>${escHtml(c.text)}</span>
          </li>`;
      }).join('');
      return `
        <div class="question-body">
          <div class="question-text">${escHtml(q.questionText)}</div>
          <ul class="choices">${choicesHtml}</ul>
        </div>`;
    } else {
      const cols = q.blanks.length;
      const colsHtml = q.blanks.map((blank, bi) => {
        const choicesHtml = blank.choices.map((c, ci) => {
          const sel = Array.isArray(userAns) && userAns[bi] === c.text;
          return `
            <li class="choice ${sel ? 'selected' : ''}" onclick="selectTC(${si},${qi},${bi},'${escAttr(c.text)}')">
              <input type="radio" name="tc_${si}_${qi}_${bi}" ${sel ? 'checked' : ''}>
              <span>${escHtml(c.text)}</span>
            </li>`;
        }).join('');
        return `
          <div class="tc-column">
            <div class="tc-column-header">Blank (${blank.id})</div>
            <ul class="choices">${choicesHtml}</ul>
          </div>`;
      }).join('');
      return `
        <div class="question-body">
          <div class="question-text">${escHtml(q.questionText)}</div>
          <div class="tc-grid cols-${cols}">${colsHtml}</div>
        </div>`;
    }
  }

  if (q.type === 'SE') {
    const selArr = Array.isArray(userAns) ? userAns : [];
    const choicesHtml = q.choices.map(c => {
      const sel = selArr.includes(c.label);
      return `
        <li class="choice ${sel ? 'selected' : ''}" onclick="toggleSE(${si},${qi},'${c.label}')">
          <input type="checkbox" ${sel ? 'checked' : ''}>
          <span><span class="label">${c.label}.</span>${escHtml(c.text)}</span>
        </li>`;
    }).join('');
    return `
      <div class="question-body">
        <div class="directions">Select exactly two answer choices that, when used to complete the sentence, fit the meaning of the sentence as a whole and produce completed sentences that are alike in meaning.</div>
        <div class="question-text">${escHtml(q.questionText)}</div>
        <ul class="choices">${choicesHtml}</ul>
        <div class="se-warning" id="se-warn-${si}-${qi}">정확히 2개를 선택해주세요.</div>
      </div>`;
  }
  return '';
}

function escHtml(str) {
  if (!str) return '';
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function escAttr(str) {
  if (!str) return '';
  return str.replace(/'/g, '\\u0027').replace(/"/g, '\\u0022');
}

// ============================================================
// ANSWER HANDLERS
// ============================================================
function selectSingle(si, qi, label) {
  state.answers[si][qi] = label;
  renderQuestion($('app'));
}

function toggleMulti(si, qi, label) {
  let arr = state.answers[si][qi];
  if (!Array.isArray(arr)) arr = [];
  const idx = arr.indexOf(label);
  if (idx >= 0) arr.splice(idx, 1);
  else arr.push(label);
  state.answers[si][qi] = arr;
  renderQuestion($('app'));
}

function toggleSE(si, qi, label) {
  let arr = state.answers[si][qi];
  if (!Array.isArray(arr)) arr = [];
  const idx = arr.indexOf(label);
  if (idx >= 0) {
    arr.splice(idx, 1);
  } else {
    if (arr.length >= 2) {
      const w = $(`se-warn-${si}-${qi}`);
      if (w) { w.classList.add('show'); setTimeout(() => w.classList.remove('show'), 2000); }
      return;
    }
    arr.push(label);
  }
  state.answers[si][qi] = [...arr];
  renderQuestion($('app'));
}

function selectTC(si, qi, blankIdx, text) {
  let arr = state.answers[si][qi];
  const q = getQuestion(si, qi);
  if (!Array.isArray(arr) || arr.length !== q.blanks.length) {
    arr = new Array(q.blanks.length).fill(null);
  }
  arr[blankIdx] = text;
  state.answers[si][qi] = [...arr];
  renderQuestion($('app'));
}

// ============================================================
// NAVIGATION
// ============================================================
function goBack() {
  if (state.currentQuestion > 0) {
    state.currentQuestion--;
    renderQuestion($('app'));
  }
}

function skipQuestion() {
  const si = state.currentSection;
  const totalQ = getTotalQ(si);
  if (state.currentQuestion < totalQ - 1) {
    state.currentQuestion++;
    renderQuestion($('app'));
  }
}

function nextQuestion() {
  const si = state.currentSection;
  const totalQ = getTotalQ(si);
  if (state.currentQuestion < totalQ - 1) {
    state.currentQuestion++;
    renderQuestion($('app'));
  }
}

function finishSection() {
  const si = state.currentSection;
  const secNum = si + 1;
  showModal(
    `Section ${secNum} 완료`,
    `Section ${secNum}을 완료하시겠습니까? 완료 후에는 Section ${secNum} 문제로 돌아갈 수 없습니다.`,
    true,
    () => {
      stopTimer();
      state.sectionDone[si] = true;
      if (si === 0) {
        state.currentSection = 1;
        state.currentQuestion = 0;
        state.screen = 'section-intro';
        render();
      } else {
        state.screen = 'results';
        render();
      }
    }
  );
}

// ============================================================
// RESULTS
// ============================================================
function renderResults(app) {
  stopTimer();
  const { total, s1, s2, scaled } = computeScore();
  const totalQ = examData.sections.reduce((a, s) => a + s.questions.length, 0);

  let rows = '';
  examData.sections.forEach((sec, si) => {
    rows += `<tr class="section-divider"><td colspan="5">Section ${sec.number}</td></tr>`;
    sec.questions.forEach((q, qi) => {
      const ua = state.answers[si][qi];
      const correct = isCorrect(q, ua);
      const answered = ua && (Array.isArray(ua) ? ua.length > 0 : true);
      const typeLabel = {CR:'CR', RC_SINGLE:'RC', RC_MULTI:'RC', TC:'TC', SE:'SE'}[q.type] || q.type;
      const userDisp = getAnswerDisplay(q, ua);
      const corrDisp = getCorrectDisplay(q);
      let markHtml;
      if (!answered) markHtml = `<span class="mark-skip">-</span> <span class="mark-wrong">✗</span>`;
      else if (correct) markHtml = `<span class="mark-correct">✓</span>`;
      else markHtml = `<span class="mark-wrong">✗</span>`;
      rows += `<tr>
        <td>S${si+1}-Q${qi+1}</td>
        <td>${typeLabel}</td>
        <td>${escHtml(userDisp)}</td>
        <td>${escHtml(corrDisp)}</td>
        <td>${markHtml}</td>
      </tr>`;
    });
  });

  app.innerHTML = `
    <div style="height:0"></div>
    <main>
      <div class="results">
        <div class="results-header">
          <div class="eyebrow">시험 완료</div>
          <h2>결과 확인</h2>
          <div style="color:var(--ink-soft);font-family:-apple-system,sans-serif;font-size:14px">${examData.round} &mdash; ${examData.date}</div>
        </div>
        <div class="score-card">
          <div class="score-cell">
            <div class="label">총 정답</div>
            <div class="value">${total}<span class="total"> / ${totalQ}</span></div>
          </div>
          <div class="score-cell">
            <div class="label">환산 점수</div>
            <div class="value">${scaled}</div>
            <div class="sub">130–170 scale</div>
          </div>
          <div class="score-cell">
            <div class="label">섹션별 정답</div>
            <div class="value" style="font-size:28px">${s1}<span class="total">/12</span></div>
            <div class="sub">S2: ${s2}/15</div>
          </div>
        </div>
        <div class="results-table">
          <table>
            <thead>
              <tr>
                <th>번호</th><th>유형</th><th>내 답</th><th>정답</th><th>O/X</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
        <div class="results-actions">
          <button class="btn btn-primary" onclick="location.reload()">다시 풀기</button>
          <button class="btn" onclick="window.print()">결과 인쇄</button>
        </div>
      </div>
    </main>
  `;
}

// ============================================================
// INIT
// ============================================================
render();
</script>
</body>
</html>
